services:
  redis:
    image: redis:7-alpine
    container_name: xchng-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: xchng-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xchng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - xchng-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d xchng" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xchng-postgres-data:
